project:
  type: website
  output-dir: _site

website:
  title: "{{< var lesson.title >}}"
  favicon: assets/favicon.png
  bread-crumbs: true
  repo-url: "{{< var lesson.repo_url >}}"
  repo-actions: [edit, issue]
  navbar:
    logo: assets/logo_simple.png
    logo-alt: "OBIS logo"
    title: false
    left:
      - text: "Home"
        href: index.qmd
      - text: "Setup"
        href: setup.qmd
      - text: "Episodes"
        menu:
          - text: "Episode 1: Introduction to eDNA"
            href: episodes/01-introduction.qmd
          - text: "Episode 2: OBIS & Darwin Core"
            href: episodes/02-obis-darwin-core.qmd
          - text: "Episode 3: Data Standards"
            href: episodes/03-data-standards.qmd
          - text: "Episode 4: Structuring Datasets"
            href: episodes/04-structuring-datasets.qmd
          - text: "Episode 5: Metadata"
            href: episodes/05-metadata.qmd
    right:
      - icon: github
        href: "{{< var lesson.repo_url >}}"
        aria-label: GitHub
  page-footer:
    border: true
    left: |
      Lesson design follows [The Carpentries](https://carpentries.org) pedagogical framework.
      Content is licensed [CC BY 4.0](https://creativecommons.org/licenses/by/4.0/).
    center:
      - text: ""
        href: ""
    right: |
      [![IOC-UNESCO logo](assets/logo_ioc_w.svg){height=32px}](https://ioc.unesco.org)
      [![IODE logo](assets/logo_iode.png){height=32px}](https://www.iode.org)

format:
  html:
    theme:
      light: [flatly, _extensions/obis-workshop/obis-workshop.scss]
      dark:  [darkly, _extensions/obis-workshop/obis-workshop.scss]
    css: _extensions/obis-workshop/obis-callouts.css
    toc: true
    toc-depth: 3
    toc-title: "On this page"
    number-sections: false
    code-fold: false
    code-tools: true
    code-copy: true
    highlight-style: github
    df-print: paged

execute:
  freeze: auto
  echo: true
  warning: false
  message: false

knitr:
  opts_chunk:
    comment: "#>"
    fig.align: "center"
    fig.width: 7
    fig.height: 5
