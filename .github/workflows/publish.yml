name: Publish lesson site

on:
  push:
    branches:
      - master

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/rocker-org/quarto:latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Quarto extensions
        run: quarto add quarto-ext/fontawesome --no-prompt

      - name: Render learner site
        run: quarto render --no-execute

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages